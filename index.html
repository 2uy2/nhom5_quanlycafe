<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý tồn kho Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
    <h2 class="text-center mb-4">☕ Quản lý tồn kho quán Cafe</h2>

    <!-- Nút thêm -->
    <button class="btn btn-success mb-3">+ Thêm nguyên liệu</button>

    <!-- Bảng -->
    <table class="table table-bordered table-hover text-center">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Tên nguyên liệu</th>
                <th>Số lượng</th>
                <th>Đơn vị</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Cà phê hạt</td>
                <td>5</td>
                <td>Kg</td>
                <td><span class="badge bg-warning">Sắp hết</span></td>
                <td>
                    <button class="btn btn-primary btn-sm">Sửa</button>
                    <button class="btn btn-danger btn-sm">Xóa</button>
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>Sữa tươi</td>
                <td>20</td>
                <td>Lít</td>
                <td><span class="badge bg-success">Còn hàng</span></td>
                <td>
                    <button class="btn btn-primary btn-sm">Sửa</button>
                    <button class="btn btn-danger btn-sm">Xóa</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
